name: Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # ✅ Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://npm.pkg.github.com"
          scope: "@Rayeeskha"   # ✅ FIXED (match your package name)

      # ✅ Install dependencies (including devDependencies)
      - name: Install dependencies
        run: npm ci

      # ✅ Build project
      - name: Build project
        run: npm run build

      # ✅ Configure npm for GitHub Packages
      - name: Configure npm auth
        run: |
          echo "@Rayeeskha:registry=https://npm.pkg.github.com/" > build/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> build/.npmrc

      # ✅ Publish package
      - name: Publish package
        run: npm publish --provenance --access public
        working-directory: ./build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}   # ✅ Use your NPM token
